name: iOS Build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    name: Build iOS App
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: List available schemes
        run: |
          xcodebuild -list

      - name: Create iOS Simulator
        run: |
          xcrun simctl create "iPhone 16" "iPhone 16" com.apple.CoreSimulator.SimRuntime.iOS-18-2
          xcrun simctl list devices | grep "iPhone 16"

      - name: Build app
        run: |
          xcodebuild \
            -scheme LabFlow \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.2' \
            clean build \
            CODE_SIGNING_ALLOWED=NO
