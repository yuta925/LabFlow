name: iOS Build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    name: Build iOS App
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcode-select -p

      - name: List available schemes
        run: |
          xcodebuild -list

      - name: Build app
        run: |
          xcodebuild \
            -scheme LabFlow \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            clean build \
            CODE_SIGNING_ALLOWED=NO
